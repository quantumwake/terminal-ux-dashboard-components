name: Publish to npm

# Trigger: create a GitHub Release (which creates a git tag).
# The git tag must match the version in package.json (e.g. v0.1.0).
on:
  release:
    types: [published]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches package.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED="v${PKG_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag '$TAG' does not match package.json version '$EXPECTED'"
            exit 1
          fi
          echo "Tag $TAG matches package.json version $PKG_VERSION"

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: validate
    environment: npm                  # set NPM_TOKEN as an environment secret here
    permissions:
      contents: read
      id-token: write                 # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Publish with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
